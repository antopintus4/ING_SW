version: '3.8'

services:
  database:
    image: postgres:15-alpine
    container_name: afam-database
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: afam_identity
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - afam-network

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: afam-backend
    depends_on:
      - database
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://database:5432/afam_identity
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
    ports:
      - "8080:8080"
    networks:
      - afam-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: afam-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - afam-network

networks:
  afam-network:
    driver: bridge

volumes:
  postgres_data:
