<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm border-danger">
        <div class="card-header bg-danger text-white">
          <h4 class="mb-0">Modifica Password</h4>
        </div>
        <div class="card-body">
          <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>
          <div *ngIf="successMessage" class="alert alert-success">{{ successMessage }}</div>

          <form (ngSubmit)="save()">
            <div class="mb-3">
              <label class="form-label">Password Attuale *</label>
              <input type="password" class="form-control" name="currentPassword" [(ngModel)]="passwords.currentPassword" required>
            </div>
            
            <div class="mb-3">
              <label class="form-label">Nuova Password *</label>
              <input type="password" class="form-control" name="newPassword" [(ngModel)]="passwords.newPassword" required>
            </div>

            <div class="mb-4">
              <label class="form-label">Conferma Nuova Password *</label>
              <input type="password" class="form-control" name="confirmPassword" [(ngModel)]="passwords.confirmPassword" required>
            </div>

            <div class="d-flex justify-content-end">
              <a routerLink="/profile" class="btn btn-secondary me-2">Annulla</a>
              <button type="submit" class="btn btn-danger" [disabled]="!passwords.currentPassword || !passwords.newPassword || !passwords.confirmPassword">Cambia Password</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
