<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm border-warning">
        <div class="card-header bg-warning text-dark">
          <h4 class="mb-0">Modifica Credenziali</h4>
        </div>
        <div class="card-body">
          <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>
          <div *ngIf="successMessage" class="alert alert-success">{{ successMessage }}</div>
          
          <div class="alert alert-info small">
            Attenzione: modificando lo username aggiorneremo automaticamente la tua sessione corrente.
          </div>

          <form (ngSubmit)="save()">
            <div class="mb-3">
              <label class="form-label">Username *</label>
              <input type="text" class="form-control" name="username" [(ngModel)]="credentials.username" required>
            </div>
            
            <div class="mb-4">
              <label class="form-label">Email *</label>
              <input type="email" class="form-control" name="email" [(ngModel)]="credentials.email" required>
            </div>

            <div class="d-flex justify-content-end">
              <a routerLink="/profile" class="btn btn-secondary me-2">Annulla</a>
              <button type="submit" class="btn btn-warning" [disabled]="!credentials.username || !credentials.email">Aggiorna Credenziali</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
