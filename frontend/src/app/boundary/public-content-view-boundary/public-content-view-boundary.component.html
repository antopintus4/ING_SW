<div class="container mt-5">
  <div *ngIf="errorMessage" class="alert alert-danger text-center shadow-sm">
    <i class="bi bi-exclamation-triangle-fill fs-4 d-block mb-2"></i>
    {{ errorMessage }}
    <div class="mt-3">
      <a routerLink="/search" class="btn btn-outline-danger btn-sm">Torna alla Ricerca</a>
    </div>
  </div>

  <div *ngIf="contenuto" class="card shadow">
    <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
      <h4 class="mb-0"><i class="bi bi-file-earmark-text me-2"></i>{{ contenuto.titolo }}</h4>
      <span class="badge bg-light text-dark">{{ contenuto.tipo }}</span>
    </div>
    <div class="card-body p-4">
      <div class="mb-4">
        <h5>Descrizione</h5>
        <p class="text-muted">{{ contenuto.descrizione || 'Nessuna descrizione.' }}</p>
      </div>

      <hr>
      <h5>Allegati</h5>
      <div *ngIf="!contenuto.allegati || contenuto.allegati.length === 0" class="text-muted small">
        Nessun allegato presente.
      </div>
      <ul class="list-group mt-2" *ngIf="contenuto.allegati && contenuto.allegati.length > 0">
        <li *ngFor="let a of contenuto.allegati" class="list-group-item d-flex justify-content-between align-items-center">
          <span><i class="bi bi-paperclip me-2"></i>{{ a.urlFile }}</span>
          <button class="btn btn-sm btn-primary" (click)="download(a.id, a.urlFile)">
            <i class="bi bi-download"></i> Scarica
          </button>
        </li>
      </ul>
    </div>
    <div class="card-footer bg-light text-end">
      <a routerLink="/search" class="btn btn-outline-secondary">Torna indietro</a>
    </div>
  </div>
</div>
