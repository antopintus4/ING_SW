<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h3 class="card-title text-center mb-4">Carica un Nuovo Contenuto</h3>

          <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>
          <div *ngIf="successMessage" class="alert alert-success">{{ successMessage }}</div>

          <form [formGroup]="uploadForm" (ngSubmit)="onSubmit()">
            
            <div class="mb-3">
              <label for="titolo" class="form-label">Titolo</label>
              <input type="text" class="form-control" id="titolo" formControlName="titolo" 
                     [ngClass]="{'is-invalid': uploadForm.get('titolo')?.invalid && uploadForm.get('titolo')?.touched}">
            </div>

            <div class="mb-3">
              <label for="descrizioneFile" class="form-label">File di Descrizione (Testo)</label>
              <input type="file" class="form-control" id="descrizioneFile" (change)="onDescrizioneFileSelected($event)" accept=".txt,.md,.json">
              <div class="form-text">Carica un file di testo contenente la descrizione.</div>
            </div>

            <div class="mb-3">
              <label for="autori" class="form-label">Autori (separati da virgola)</label>
              <input type="text" class="form-control" id="autori" formControlName="autori" placeholder="es. Autore 1, Autore 2">
            </div>

            <div class="mb-3">
              <label for="collaboratori" class="form-label">Collaboratori (separati da virgola)</label>
              <input type="text" class="form-control" id="collaboratori" formControlName="collaboratori" placeholder="es. Collab 1, Collab 2">
            </div>

            <div class="mb-3">
              <label for="policyVisibilita" class="form-label">Visibilità</label>
              <select class="form-select" id="policyVisibilita" formControlName="policyVisibilita">
                <option value="Pubblico">Pubblico</option>
                <option value="Privato">Privato</option>
                <option value="Solo Studenti">Solo Studenti</option>
              </select>
            </div>

            <div class="mb-4">
              <label for="fileUpload" class="form-label">File (Max 10MB)</label>
              <input type="file" class="form-control" id="fileUpload" (change)="onFileSelected($event)" multiple>
              <div class="form-text">Puoi caricare uno o più file (immagine, PDF, video o archivi).</div>
            </div>

            <button type="submit" class="btn btn-primary w-100" [disabled]="uploadForm.invalid || selectedFiles.length === 0">
              Carica Contenuto
            </button>
          </form>

        </div>
      </div>
    </div>
  </div>
</div>
