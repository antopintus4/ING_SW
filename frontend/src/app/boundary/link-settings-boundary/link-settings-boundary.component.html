<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">

      <div *ngIf="errorMessage" class="alert alert-danger text-center">
        <h4><i class="bi bi-exclamation-triangle"></i> Errore</h4>
        <p>{{ errorMessage }}</p>
        <button class="btn btn-outline-danger btn-sm" (click)="indietro()">Torna ai Link</button>
      </div>

      <div *ngIf="linkDetails" class="card shadow-lg border-0 rounded-3">
        <div class="card-header bg-dark text-white p-4">
          <h3 class="mb-0"><i class="bi bi-gear-fill me-2 text-info"></i>Impostazioni Link</h3>
          <p class="mb-0 opacity-75 mt-2">Configura le opzioni del link di condivisione</p>
        </div>

        <div class="card-body p-4">
          <div class="mb-3">
            <span class="text-uppercase fw-bold text-secondary d-block mb-1" style="font-size: 0.8rem;">RISORSA COLLEGATA</span>
            <span class="fs-5 fw-bold text-primary">{{ linkDetails.contenuto?.titolo || 'N/D' }}</span>
          </div>

          <hr class="my-4">

          <form (ngSubmit)="salva()">
            <!-- Data di scadenza (RAD) -->
            <div class="mb-4">
              <label for="scadenzaInput" class="form-label fw-bold">
                <i class="bi bi-calendar-event me-2 text-primary"></i>Data di Scadenza
              </label>
              <input type="datetime-local" 
                     id="scadenzaInput" 
                     class="form-control form-control-lg" 
                     [(ngModel)]="dataScadenza" 
                     name="dataScadenza"
                     required>
            </div>

            <!-- Contenuti inclusi / Allegati (RAD) -->
            <div class="mb-4" *ngIf="risorse && risorse.length > 0">
              <label class="form-label fw-bold">
                <i class="bi bi-files me-2 text-primary"></i>Allegati Inclusi nella Condivisione
              </label>
              <p class="text-muted small">Seleziona quali file dell'opera rendere accessibili tramite questo link:</p>
              
              <div class="list-group shadow-sm">
                <div *ngFor="let r of risorse" 
                     class="list-group-item d-flex align-items-center py-3">
                  <input class="form-check-input me-3" 
                         type="checkbox" 
                         [id]="'risorsa-' + r.id"
                         [(ngModel)]="r.checked"
                         [name]="'ris-' + r.id">
                  <label class="form-check-label d-flex align-items-center w-100 cursor-pointer" [for]="'risorsa-' + r.id">
                    <i class="bi bi-file-earmark-text fs-4 text-secondary me-2"></i>
                    <span class="text-truncate fw-semibold" style="max-width: 80%;">{{ r.urlFile }}</span>
                  </label>
                </div>
              </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mt-5 pt-3 border-top">
              <button type="button" class="btn btn-outline-secondary px-4 py-2" (click)="indietro()">
                Annulla
              </button>
              <button type="submit" class="btn btn-info text-white px-5 py-2 fw-bold shadow-sm">
                Salva
              </button>
            </div>
          </form>
        </div>
      </div>

    </div>
  </div>
</div>

<app-message-boundary #messageBoundary></app-message-boundary>
