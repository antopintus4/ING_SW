<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6 text-center">
      <i class="bi {{ errorIcon }} text-danger" style="font-size: 5rem;"></i>
      <h2 class="mt-4 text-danger">Ops! Qualcosa è andato storto</h2>
      <p class="lead mt-3 text-muted">{{ errorMessage }}</p>
      
      <div class="mt-5">
        <button class="btn btn-primary" onclick="window.location.reload();">
          <i class="bi bi-arrow-clockwise me-2"></i> Riprova
        </button>
        <a routerLink="/" class="btn btn-outline-secondary ms-2">
          <i class="bi bi-house-door me-2"></i> Torna alla Home
        </a>
      </div>
    </div>
  </div>
</div>
