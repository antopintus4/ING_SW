<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">

      <div *ngIf="errorMessage" class="alert alert-danger text-center">
        <h4><i class="bi bi-exclamation-triangle"></i> Oops!</h4>
        <p>{{ errorMessage }}</p>
      </div>

      <div *ngIf="contenuto" class="card shadow-lg border-0 rounded-3">
        <div class="card-header bg-primary text-white text-center py-4">
          <h3 class="mb-0">{{ contenuto.titolo }}</h3>
          <p class="mb-0 opacity-75 mt-2">Condiviso con te tramite AFAM Identity</p>
        </div>
        
        <div class="card-body p-4 text-center">
          <p class="card-text text-muted mb-4" style="font-size: 1.1rem;">
            {{ contenuto.descrizione || 'Nessuna descrizione disponibile.' }}
          </p>

          <hr class="mb-4">

          <div class="d-flex justify-content-between align-items-center bg-light p-3 rounded">
            <div>
              <span class="text-uppercase fw-bold text-secondary" style="font-size: 0.8rem;">TIPO FILE</span><br>
              <span class="fs-5">{{ contenuto.tipo || 'Sconosciuto' }}</span>
            </div>
            <div>
              <button class="btn btn-info btn-lg px-4 rounded-pill shadow-sm text-white me-2" (click)="view()">
                <i class="bi bi-eye me-2"></i> Visualizza File
              </button>
              <button class="btn btn-success btn-lg px-4 rounded-pill shadow-sm" (click)="download()">
                <i class="bi bi-download me-2"></i> Scarica File
              </button>
            </div>
          </div>
        </div>
        <div class="card-footer bg-white text-center py-3">
          <small class="text-muted">Powered by AFAM Framework</small>
        </div>
      </div>

    </div>
  </div>
</div>
