<div class="container mt-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>I Tuoi Gruppi (Raccolte)</h2>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>
  <div *ngIf="successMessage" class="alert alert-success">{{ successMessage }}</div>

  <!-- Creazione nuovo gruppo -->
  <div class="card mb-4 shadow-sm">
    <div class="card-body d-flex align-items-center">
      <h5 class="mb-0 me-3">Nuovo Gruppo</h5>
      <input type="text" class="form-control me-3" style="max-width: 300px;" placeholder="Nome del gruppo..." [(ngModel)]="newGroupName">
      <button class="btn btn-primary" (click)="createGroup()" [disabled]="!newGroupName.trim()">Crea</button>
    </div>
  </div>

  <div *ngIf="groups.length === 0" class="alert alert-info">
    Nessun gruppo presente. Inizia creandone uno nuovo!
  </div>

  <div class="row" *ngIf="groups.length > 0">
    <div class="col-md-4 mb-4" *ngFor="let g of groups">
      <div class="card h-100 shadow-sm border-info">
        <div class="card-body text-center">
          <i class="bi bi-folder-fill text-info" style="font-size: 3rem;"></i>
          <h4 class="card-title mt-2 text-truncate">{{ g.nome }}</h4>
          <p class="card-text text-muted">{{ g.contenuti?.length || 0 }} elementi</p>
        </div>
        <div class="card-footer bg-white border-top-0 d-flex justify-content-between">
          <a [routerLink]="['/groups/view', g.id]" class="btn btn-sm btn-outline-info">Apri</a>
          <div>
            <button class="btn btn-sm btn-outline-secondary me-1" (click)="renameGroup(g.id, g.nome)"><i class="bi bi-pencil"></i></button>
            <button class="btn btn-sm btn-outline-danger" (click)="deleteGroup(g.id)"><i class="bi bi-trash"></i></button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
