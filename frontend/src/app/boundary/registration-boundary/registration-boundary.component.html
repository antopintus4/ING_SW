<div class="row justify-content-center mt-5">
  <div class="col-md-8 col-lg-6">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h3 class="card-title text-center mb-4">Registrazione</h3>
        
        <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>
        <div *ngIf="successMessage" class="alert alert-success">{{ successMessage }}</div>

        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
          
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="username" class="form-label">Username</label>
              <input type="text" class="form-control" id="username" formControlName="username"
                     [ngClass]="{'is-invalid': registerForm.get('username')?.invalid && registerForm.get('username')?.touched}">
            </div>
            <div class="col-md-6 mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" class="form-control" id="email" formControlName="email"
                     [ngClass]="{'is-invalid': registerForm.get('email')?.invalid && registerForm.get('email')?.touched}">
            </div>
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" formControlName="password"
                   [ngClass]="{'is-invalid': registerForm.get('password')?.invalid && registerForm.get('password')?.touched}">
          </div>

          <hr class="my-4">
          <h5 class="mb-3">Dati Anagrafici</h5>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="nome" class="form-label">Nome</label>
              <input type="text" class="form-control" id="nome" formControlName="nome"
                     [ngClass]="{'is-invalid': registerForm.get('nome')?.invalid && registerForm.get('nome')?.touched}">
            </div>
            <div class="col-md-6 mb-3">
              <label for="cognome" class="form-label">Cognome</label>
              <input type="text" class="form-control" id="cognome" formControlName="cognome"
                     [ngClass]="{'is-invalid': registerForm.get('cognome')?.invalid && registerForm.get('cognome')?.touched}">
            </div>
          </div>

          <div class="row">
            <div class="col-md-4 mb-3">
              <label for="sesso" class="form-label">Sesso</label>
              <select class="form-select" id="sesso" formControlName="sesso"
                      [ngClass]="{'is-invalid': registerForm.get('sesso')?.invalid && registerForm.get('sesso')?.touched}">
                <option value="">Seleziona</option>
                <option value="M">Maschio</option>
                <option value="F">Femmina</option>
              </select>
            </div>
            <div class="col-md-4 mb-3">
              <label for="dataNascita" class="form-label">Data di Nascita</label>
              <input type="date" class="form-control" id="dataNascita" formControlName="dataNascita"
                     [ngClass]="{'is-invalid': registerForm.get('dataNascita')?.invalid && registerForm.get('dataNascita')?.touched}">
            </div>
            <div class="col-md-4 mb-3">
              <label for="cittaNascita" class="form-label">Città di Nascita</label>
              <input type="text" class="form-control" id="cittaNascita" formControlName="cittaNascita" list="comuniList"
                     [ngClass]="{'is-invalid': registerForm.get('cittaNascita')?.invalid && registerForm.get('cittaNascita')?.touched}">
              <datalist id="comuniList">
                <option *ngFor="let c of comuniFiltrati" [value]="c.nome"></option>
              </datalist>
            </div>
          </div>

          <div class="row align-items-end mb-4">
            <div class="col-md-8 mb-3 mb-md-0">
              <label for="codiceFiscale" class="form-label">Codice Fiscale</label>
              <input type="text" class="form-control" id="codiceFiscale" formControlName="codiceFiscale"
                     [ngClass]="{'is-invalid': registerForm.get('codiceFiscale')?.invalid && registerForm.get('codiceFiscale')?.touched}">
            </div>
            <div class="col-md-4">
              <button type="button" class="btn btn-outline-secondary w-100" (click)="generaCF()">Genera CF</button>
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100" [disabled]="registerForm.invalid">Registrati</button>
        </form>
        
      </div>
    </div>
  </div>
</div>
