<div class="row justify-content-center mt-5">
  <div class="col-md-6 col-lg-4">
    <div class="card shadow-sm">
      <div class="card-body p-4 text-center">
        <h3 class="card-title mb-3">Verifica in due passaggi</h3>
        <p class="text-muted mb-4">
          Abbiamo inviato un codice di 6 cifre al tuo indirizzo email. Inseriscilo qui sotto per completare l'accesso.
        </p>
        
        <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

        <form [formGroup]="otpForm" (ngSubmit)="onSubmit()">
          
          <div class="mb-4">
            <input type="text" class="form-control form-control-lg text-center" id="otp" formControlName="otp"
                   maxlength="6" placeholder="123456"
                   [ngClass]="{'is-invalid': otpForm.get('otp')?.invalid && otpForm.get('otp')?.touched}">
            <div class="invalid-feedback">Inserisci un codice valido di 6 cifre.</div>
          </div>

          <button type="submit" class="btn btn-primary w-100 btn-lg" [disabled]="otpForm.invalid">Verifica</button>
        </form>
        
      </div>
    </div>
  </div>
</div>
