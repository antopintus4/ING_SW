spring:
  application:
    name: identity
  datasource:
    url: jdbc:postgresql://localhost:5432/afam_identity
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080

app:
  storage:
    upload-dir: uploads/
